apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/part-of: basic-auth-cluster-trait
  name: basic-auth-system
---
apiVersion: v1
data:
  nginx.conf: |
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      access_log /dev/stdout;
      # nginx stashes its temp dirs under /var/cache/nginx; remap to /tmp so
      # we can run with a read-only root filesystem.
      client_body_temp_path /tmp/client_body 1 2;
      proxy_temp_path       /tmp/proxy 1 2;
      fastcgi_temp_path     /tmp/fastcgi 1 2;
      uwsgi_temp_path       /tmp/uwsgi 1 2;
      scgi_temp_path        /tmp/scgi 1 2;

      # Shared auth directive — referenced from each server block via
      # `include /etc/nginx/conf.d/common-auth.conf;` below.
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      # healthcare.shrader.cloud -> healthcare-app-trait
      server {
        listen 8080;
        server_name healthcare.shrader.cloud;

        auth_basic           "GDC Healthcare Demo";
        auth_basic_user_file /etc/nginx/htpasswd/auth;

        location / {
          proxy_pass http://healthcare-review-ui.healthcare-demo.svc.cluster.local:80;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host  $host;
          proxy_http_version 1.1;
          proxy_set_header Upgrade    $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_read_timeout 180s;
          proxy_send_timeout 180s;
        }
      }

      # energy.shrader.cloud -> offshore-drilling-app-trait
      server {
        listen 8080;
        server_name energy.shrader.cloud;

        auth_basic           "GDC Offshore Drilling Demo";
        auth_basic_user_file /etc/nginx/htpasswd/auth;

        location / {
          proxy_pass http://offshore-review-ui.energy-demo.svc.cluster.local:80;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host  $host;
          proxy_http_version 1.1;
          proxy_set_header Upgrade    $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_read_timeout 180s;
          proxy_send_timeout 180s;
        }
      }

      # kagent.shrader.cloud -> kagent UI in kagent-system
      server {
        listen 8080;
        server_name kagent.shrader.cloud;

        auth_basic           "GDC Healthcare Demo";
        auth_basic_user_file /etc/nginx/htpasswd/auth;

        location / {
          # kagent-system/kagent-ui:8080 — confirmed via `kubectl get svc -n kagent-system`.
          proxy_pass http://kagent-ui.kagent-system.svc.cluster.local:8080;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host  $host;
          proxy_http_version 1.1;
          proxy_set_header Upgrade    $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_read_timeout 180s;
          proxy_send_timeout 180s;
        }
      }

      # demos.shrader.cloud -> demo-dashboard-cluster-trait
      # Front door for the entire demo reel: card grid + per-demo
      # warmup/cooldown buttons. Short proxy_read_timeout (30s) since
      # the dashboard does NOT call any LLM in the request path.
      server {
        listen 8080;
        server_name demos.shrader.cloud;

        auth_basic           "GDC Demo Reel";
        auth_basic_user_file /etc/nginx/htpasswd/auth;

        location / {
          proxy_pass http://demo-dashboard.demo-dashboard-system.svc.cluster.local:80;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host  $host;
          proxy_http_version 1.1;
          proxy_set_header Upgrade    $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_read_timeout 30s;
          proxy_send_timeout 30s;
        }
      }

      # seismic.shrader.cloud -> seismic-app-trait
      # Fork-and-synthesize pattern: parallel specialist MCP tools, Drill-Site
      # Viability scoring, VSR-at-the-end, Gemini synthesis. Longer timeout
      # because the workflow includes an LLM call (~10s).
      server {
        listen 8080;
        server_name seismic.shrader.cloud;

        auth_basic           "GDC Seismic Interpretation Demo";
        auth_basic_user_file /etc/nginx/htpasswd/auth;

        location / {
          # seismic-system/seismic-review-ui:8080
          proxy_pass http://seismic-review-ui.seismic-system.svc.cluster.local:8080;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Forwarded-Host  $host;
          proxy_http_version 1.1;
          proxy_set_header Upgrade    $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_read_timeout 180s;
          proxy_send_timeout 180s;
        }
      }

      # Healthcheck for k8s probes. No auth on /healthz.
      server {
        listen 8081;
        server_name _;
        location /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
      }
    }
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/part-of: basic-auth-cluster-trait
  name: basic-auth-nginx-config
  namespace: basic-auth-system
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: basic-auth-gatekeeper
    app.kubernetes.io/part-of: basic-auth-cluster-trait
  name: basic-auth-gatekeeper
  namespace: basic-auth-system
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/name: basic-auth-gatekeeper
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: basic-auth-gatekeeper
    app.kubernetes.io/part-of: basic-auth-cluster-trait
  name: basic-auth-gatekeeper
  namespace: basic-auth-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: basic-auth-gatekeeper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: basic-auth-gatekeeper
    spec:
      containers:
      - image: nginxinc/nginx-unprivileged:1.27-alpine
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 10
          periodSeconds: 30
        name: nginx
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8081
          name: health
        readinessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 2
          periodSeconds: 10
        resources:
          limits:
            cpu: 250m
            memory: 128Mi
          requests:
            cpu: 25m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101
        volumeMounts:
        - mountPath: /etc/nginx/nginx.conf
          name: nginx-config
          readOnly: true
          subPath: nginx.conf
        - mountPath: /etc/nginx/htpasswd
          name: htpasswd
          readOnly: true
        - mountPath: /tmp
          name: tmp
      volumes:
      - configMap:
          name: basic-auth-nginx-config
        name: nginx-config
      - name: htpasswd
        secret:
          secretName: basic-auth-htpasswd
      - emptyDir: {}
        name: tmp
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/part-of: basic-auth-cluster-trait
  name: basic-auth-htpasswd-es
  namespace: basic-auth-system
spec:
  data:
  - remoteRef:
      key: demo-basic-auth-htpasswd
    secretKey: htpasswd
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-store
  target:
    creationPolicy: Owner
    name: basic-auth-htpasswd
    template:
      data:
        auth: '{{ .htpasswd }}'
      type: Opaque
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  labels:
    app.kubernetes.io/part-of: basic-auth-cluster-trait
  name: gatekeeper-backend-grant
  namespace: basic-auth-system
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: kagent-system
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: healthcare-demo
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: energy-demo
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: demo-dashboard-system
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: seismic-system
  to:
  - group: ""
    kind: Service
    name: basic-auth-gatekeeper
