---
# Pull the htpasswd line from GSM into a K8s Secret in basic-auth-system.
# The GSM entry `demo-basic-auth-htpasswd` is a single-line htpasswd blob
# created on 2026-04-23 for the `admin:gemini-on-gdc-demo` demo credential:
#   admin:$apr1$<salt>$<hash>
# Rotating the demo password = add a new version in GSM + force-sync this ES.
# Generic name (not "shrader") so other app-traits in the demo reel can
# share the same credential pool without coupling to my username.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: basic-auth-htpasswd-es
  namespace: basic-auth-system
  labels:
    app.kubernetes.io/part-of: basic-auth-cluster-trait
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-store
  target:
    name: basic-auth-htpasswd
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # nginx auth_basic_user_file reads this path; the file content is
        # the raw htpasswd line (username:hashed-password).
        auth: "{{ .htpasswd }}"
  data:
    - secretKey: htpasswd
      remoteRef:
        key: demo-basic-auth-htpasswd
